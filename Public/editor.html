<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>剧本编辑器</title><style>body{background:#0D0D0D;color:#e0e6ed;font-family:serif;padding:20px}textarea{background:#1a1a1a;color:#fff;border:1px solid #4a5568;width:100%;height:400px}button{background:#FF2A7A;color:#fff;border:none;padding:10px 20px;cursor:pointer}</style></head><body><h1>🎭 剧本编辑器</h1><textarea id="json-input" placeholder="粘贴剧本JSON..."></textarea><button onclick="upload()">上传剧本</button><div id="msg"></div><script>async function upload(){try{const s=JSON.parse(document.getElementById('json-input').value);const r=await fetch('/api/scripts/upload',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(s)});const d=await r.json();document.getElementById('msg').textContent=d.success?'上传成功！':'失败：'+d.error}catch(e){document.getElementById('msg').textContent='JSON格式错误'}}</script></body></html>
